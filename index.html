<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket - Tüm Telefonlar İçin AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #f4f4f9; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Modeli ekranda göstereceğimiz alan */
        model-viewer {
            width: 100%; height: 100%; border: none;
            /* Yüklenirken arka plan rengi */
            --poster-color: transparent; 
        }

        /* Bizim Özel AR Butonumuz - ÜSTE ALINDI */
        #ar-button {
            position: absolute; 
            top: 30px; /* Burayı bottom yerine top yaptık */
            left: 50%; 
            transform: translateX(-50%);
            background-color: #007bff; color: white; border: none; border-radius: 8px;
            padding: 15px 30px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #ar-button:active { background-color: #0056b3; }

        /* AR desteklemeyen cihazlar için uyarı */
        #ar-prompt { display: none; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=5" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        alt="HY Maket 3D Model">
        
        <button slot="ar-button" id="ar-button">
            Kamerayı Aç ve Başla
        </button>

    </model-viewer>

</body>
</html>
