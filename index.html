<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket - Gerçek Dünya Sabitlemesi (WebXR)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        // 1. ZEMİN ALGILAMA VE HEDEF HALKASI (RETICLE) BİLEŞENİ
        AFRAME.registerComponent('ar-hit-test', {
            init: function () {
                this.xrHitTestSource = null;
                this.viewerSpace = null;
                this.refSpace = null;

                // WebXR oturumu başladığında zemin taramasını başlat
                this.el.sceneEl.renderer.xr.addEventListener('sessionstart', async () => {
                    let session = this.el.sceneEl.renderer.xr.getSession();
                    this.viewerSpace = await session.requestReferenceSpace('viewer');
                    this.refSpace = await session.requestReferenceSpace('local');
                    this.xrHitTestSource = await session.requestHitTestSource({ space: this.viewerSpace });
                });

                this.el.sceneEl.renderer.xr.addEventListener('sessionend', () => {
                    this.xrHitTestSource = null;
                });
            },
            tick: function () {
                if (this.el.sceneEl.is('ar-mode') && this.xrHitTestSource) {
                    let frame = this.el.sceneEl.frame;
                    if (!frame) return;

                    // Kameranın baktığı yerde bir zemin var mı kontrol et
                    let hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
                    if (hitTestResults.length > 0) {
                        let pose = hitTestResults[0].getPose(this.refSpace);
                        
                        // Zemin bulunduysa hedef halkasını görünür yap ve oraya taşı
                        this.el.setAttribute('visible', 'true');
                        this.el.object3D.position.copy(pose.transform.position);
                        
                        // Halkanın zemine tam yatay oturmasını sağla
                        this.el.object3D.quaternion.copy(pose.transform.orientation);
                    } else {
                        // Zemin bulunamadıysa halkayı gizle
                        this.el.setAttribute('visible', 'false');
                    }
                }
            }
        });

        // 2. EKRANA DOKUNUNCA MODELİ YERLEŞTİRME BİLEŞENİ
        AFRAME.registerComponent('tap-to-place', {
            init: function () {
                const reticle = document.getElementById('reticle');
                const model = document.getElementById('model');

                // AR moduna girildiğinde dokunma (select) olayını dinle
                this.el.sceneEl.addEventListener('enter-vr', () => {
                    const session = this.el.sceneEl.renderer.xr.getSession();
                    if (session) {
                        session.addEventListener('select', () => {
                            // Eğer hedef halkası ekranda görünüyorsa (zemin algılandıysa)
                            if (reticle.getAttribute('visible')) {
                                // Modeli görünür yap
                                model.setAttribute('visible', 'true');
                                
                                // Modelin pozisyonunu hedef halkasının olduğu yere kopyala
                                model.object3D.position.copy(reticle.object3D.position);
                                model.object3D.quaternion.copy(reticle.object3D.quaternion);

                                // İsteğe bağlı: Modeli yerleştirdikten sonra halkayı gizleyebilirsin
                                // reticle.setAttribute('visible', 'false');
                            }
                        });
                    }
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor;" 
        renderer="colorManagement: true, physicallyCorrectLights: true"
        tap-to-place>

        <a-entity camera position="0 1.6 0"></a-entity>

        <a-entity 
            id="reticle" 
            ar-hit-test 
            visible="false">
            <a-ring color="yellow" radius-inner="0.1" radius-outer="0.15" rotation="-90 0 0"></a-ring>
            <a-circle color="yellow" radius="0.05" rotation="-90 0 0"></a-circle>
        </a-entity>

        <a-entity
            id="model"
            gltf-model="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3"
            scale="0.5 0.5 0.5"
            visible="false">
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

    </a-scene>
</body>
</html>
