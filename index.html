<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket - VR Passthrough</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #overlay {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px; background: rgba(0,0,0,0.8); color: white;
            border-radius: 10px; font-family: sans-serif; z-index: 10;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="overlay">VR Modunda Kamerayı Başlatın</div>

    <a-scene 
        webxr="optionalFeatures: dom-overlay; overlayElement: #overlay;"
        renderer="colorManagement: true; alpha: true;">

        <a-assets>
            <a-asset-item id="myModel" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb"></a-asset-item>
            <video id="webcam" playsinline></video>
        </a-assets>

        <a-videosphere src="#webcam" rotation="0 -90 0"></a-videosphere>

        <a-entity id="model" 
                  gltf-model="#myModel" 
                  scale="0.05 0.05 0.05" 
                  position="0 1.2 -2">
        </a-entity>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-entity camera look-controls></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('webcam');

        // Kameraya erişim izni al ve videoyu başlat
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function (stream) {
                    video.srcObject = stream;
                    video.play();
                })
                .catch(function (err) {
                    console.error("Kamera erişimi reddedildi: ", err);
                });
        }

        // VR Moduna girildiğinde uyarıyı güncelle
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
            document.getElementById('overlay').style.display = 'none';
        });
    </script>
</body>
</html>
