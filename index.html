<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket - Ultra Stabil AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        /* Ekranın ortasında beliren tarama kılavuzu */
        #scanner-ui {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            display: none;
            pointer-events: none;
        }
        .phone-icon {
            width: 80px; height: 80px;
            border: 4px solid white; border-radius: 10px;
            animation: movePhone 2s infinite ease-in-out;
        }
        @keyframes movePhone {
            0% { transform: translateX(-40px) rotate(-15deg); }
            50% { transform: translateX(40px) rotate(15deg); }
            100% { transform: translateX(-40px) rotate(-15deg); }
        }
        #status-text {
            color: white; font-family: sans-serif; margin-top: 15px;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 10px;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="scanner-ui">
        <div class="phone-icon"></div>
        <p id="status-text">Zemini taramak için telefonu dairesel hareket ettirin...</p>
    </div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #scanner-ui;"
        renderer="colorManagement: true; antialias: true; precision: highp;">

        <a-assets>
            <a-asset-item id="myModel" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb"></a-asset-item>
        </a-assets>

        <a-entity id="reticle" visible="false" ar-hit-test-simple>
            <a-ring color="#00FF00" radius-inner="0.06" radius-outer="0.1" rotation="-90 0 0">
                <a-animation attribute="scale" from="1 1 1" to="1.2 1.2 1.2" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
            </a-ring>
            <a-circle color="black" opacity="0.2" radius="0.12" rotation="-90 0 0"></a-circle>
        </a-entity>

        <a-entity id="model" gltf-model="#myModel" scale="0.1 0.1 0.1" visible="false"></a-entity>

        <a-entity camera position="0 1.6 0"></a-entity>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 1"></a-light>

    </a-scene>

    <script>
        // Hit-test ve UI Kontrolü
        AFRAME.registerComponent('ar-hit-test-simple', {
            init: function () {
                this.xrHitTestSource = null;
                this.viewerSpace = null;
                this.refSpace = null;
                this.ui = document.getElementById('scanner-ui');
                this.status = document.getElementById('status-text');

                this.el.sceneEl.addEventListener('enter-vr', async () => {
                    if (this.el.sceneEl.is('ar-mode')) {
                        this.ui.style.display = 'block';
                        const session = this.el.sceneEl.renderer.xr.getSession();
                        
                        this.viewerSpace = await session.requestReferenceSpace('viewer');
                        this.refSpace = await session.requestReferenceSpace('local-floor'); // local yerine local-floor kullanımı zemini daha iyi yakalar
                        this.xrHitTestSource = await session.requestHitTestSource({ space: this.viewerSpace });

                        session.addEventListener('select', () => {
                            if (this.el.getAttribute('visible')) {
                                const model = document.querySelector('#model');
                                model.setAttribute('position', this.el.getAttribute('position'));
                                model.setAttribute('quaternion', this.el.getAttribute('quaternion'));
                                model.setAttribute('visible', 'true');
                                this.status.innerText = "Model Sabitlendi!";
                                setTimeout(() => { this.ui.style.display = 'none'; }, 2000);
                            }
                        });
                    }
                });
            },
            tick: function () {
                const frame = this.el.sceneEl.frame;
                if (!frame || !this.xrHitTestSource) return;

                const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
                if (hitTestResults.length > 0) {
                    const pose = hitTestResults[0].getPose(this.refSpace);
                    this.el.setAttribute('visible', 'true');
                    this.el.object3D.position.copy(pose.transform.position);
                    this.el.object3D.quaternion.copy(pose.transform.orientation);
                    
                    this.status.innerText = "Zemin bulundu! Ekrana dokunarak yerleştirin.";
                    this.status.style.background = "rgba(0, 200, 0, 0.8)";
                } else {
                    this.el.setAttribute('visible', 'false');
                }
            }
        });
    </script>
</body>
</html>
