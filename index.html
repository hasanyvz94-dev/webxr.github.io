```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HY AR Viewer Pro</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#overlay{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.75);
color:white;
padding:12px 18px;
border-radius:8px;
z-index:10;
font-size:14px;
}

#ui{
position:fixed;
top:20px;
left:20px;
z-index:10;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:black;
color:white;
font-size:14px;
}

#scaleInfo{
margin-top:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:6px 10px;
border-radius:6px;
font-size:13px;
}

</style>

</head>

<body>

<div id="overlay">
Zemini tarayın ve dokunun
</div>

<div id="ui">
<button onclick="resetModel()">Reset</button>
<div id="scaleInfo">Scale: 1x</div>
</div>

<a-scene
webxr="requiredFeatures: hit-test,local-floor"
renderer="antialias:true;colorManagement:true;physicallyCorrectLights:true"
shadow="type:pcfsoft">

<a-assets>

<a-asset-item
id="modelAsset"
src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=5">
</a-asset-item>

</a-assets>

<a-entity id="reticle" visible="false" ar-hit-test>

<a-ring
radius-inner="0.05"
radius-outer="0.07"
rotation="-90 0 0"
color="#00ff00">
</a-ring>

</a-entity>

<a-entity
id="model"
gltf-model="#modelAsset"
visible="false"
scale="0.05 0.05 0.05"
shadow="cast:true;receive:true">
</a-entity>

<a-plane
rotation="-90 0 0"
width="20"
height="20"
shadow="receive:true"
material="color:#000;opacity:0.2">
</a-plane>

<a-light type="ambient" intensity="0.7"></a-light>

<a-light
type="directional"
position="2 4 2"
intensity="1.2"
shadow="cast:true">
</a-light>

<a-entity camera position="0 1.6 0"></a-entity>

</a-scene>

<script>

let modelPlaced=false

AFRAME.registerComponent('ar-hit-test',{

init:function(){

this.xrHitTestSource=null
this.viewerSpace=null
this.refSpace=null

this.el.sceneEl.addEventListener('enter-vr',async()=>{

const session=this.el.sceneEl.renderer.xr.getSession()

this.viewerSpace=await session.requestReferenceSpace('viewer')
this.refSpace=await session.requestReferenceSpace('local-floor')

this.xrHitTestSource=await session.requestHitTestSource({
space:this.viewerSpace
})

session.addEventListener('select',()=>{

if(modelPlaced) return

if(this.el.getAttribute('visible')){

const model=document.querySelector("#model")

model.setAttribute("position",this.el.getAttribute("position"))
model.object3D.quaternion.copy(this.el.object3D.quaternion)

model.setAttribute("visible",true)

modelPlaced=true

this.el.setAttribute("visible",false)

document.getElementById("overlay").innerHTML=
"1 parmak döndür • 2 parmak pinch büyüt"

enableControls()

}

})

})

},

tick:function(){

if(modelPlaced) return

const frame=this.el.sceneEl.frame
if(!frame || !this.xrHitTestSource) return

const hits=frame.getHitTestResults(this.xrHitTestSource)

if(hits.length>0){

const pose=hits[0].getPose(this.refSpace)

this.el.setAttribute("visible",true)

this.el.object3D.position.copy(pose.transform.position)
this.el.object3D.quaternion.copy(pose.transform.orientation)

}else{

this.el.setAttribute("visible",false)

}

}

})

function enableControls(){

const model=document.querySelector("#model")

let startX=0
let startRot=0

let startDist=0
let startScale=model.object3D.scale.x

window.addEventListener("touchstart",e=>{

if(e.touches.length==1){

startX=e.touches[0].clientX
startRot=model.object3D.rotation.y

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1])
startScale=model.object3D.scale.x

}

})

window.addEventListener("touchmove",e=>{

if(e.touches.length==1){

let dx=e.touches[0].clientX-startX
model.object3D.rotation.y=startRot + dx*0.01

}

if(e.touches.length==2){

let dist=getDistance(e.touches[0],e.touches[1])

let scale=startScale*(dist/startDist)

scale=Math.max(0.02,Math.min(scale,6))

model.object3D.scale.set(scale,scale,scale)

document.getElementById("scaleInfo").innerHTML=
"Scale: "+scale.toFixed(2)+"x"

}

})

}

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX
let dy=t1.clientY-t2.clientY

return Math.sqrt(dx*dx+dy*dy)

}

function resetModel(){

const model=document.querySelector("#model")
const reticle=document.querySelector("#reticle")

model.setAttribute("visible",false)
reticle.setAttribute("visible",true)

modelPlaced=false

document.getElementById("overlay").innerHTML=
"Zemini tekrar tarayın"

}

</script>

</body>
</html>
