<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket - Profesyonel WebXR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        AFRAME.registerComponent('ar-logic', {
            init: function () {
                this.reticle = document.querySelector('#reticle');
                this.model = document.querySelector('#model');
                this.instruction = document.querySelector('#instruction');
                
                // AR Moduna giriş kontrolü
                this.el.sceneEl.addEventListener('enter-vr', () => {
                    if (this.el.sceneEl.is('ar-mode')) {
                        this.instruction.style.display = 'block';
                        this.instruction.innerHTML = "Zemini algılamak için telefonu yavaşça hareket ettirin...";
                    }
                });

                // Ekrana dokunulduğunda yerleştirme
                this.el.sceneEl.addEventListener('select', () => {
                    if (this.reticle.getAttribute('visible')) {
                        // Modeli reticle konumuna taşı ve göster
                        this.model.setAttribute('position', this.reticle.getAttribute('position'));
                        this.model.setAttribute('quaternion', this.reticle.getAttribute('quaternion'));
                        this.model.setAttribute('visible', 'true');
                        
                        // Bilgi metnini güncelle
                        this.instruction.innerHTML = "Model yerleştirildi! Etrafında gezinebilirsiniz.";
                        setTimeout(() => { this.instruction.style.display = 'none'; }, 3000);
                    }
                });
            },
            tick: function () {
                // Hit-test sonucuna göre yazıyı güncelle
                if (this.reticle.getAttribute('visible')) {
                    if(this.instruction.innerHTML.includes("hareket ettirin")) {
                        this.instruction.innerHTML = "Zemin bulundu! Yerleştirmek için ekrana dokunun.";
                        this.instruction.style.background = "rgba(0, 255, 0, 0.5)";
                    }
                }
            }
        });
    </script>
    <style>
        #instruction {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 20px;
            font-family: sans-serif;
            z-index: 999;
            display: none;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    
    <div id="instruction">AR Hazırlanıyor...</div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #instruction;"
        ar-logic
        renderer="colorManagement: true;">

        <a-assets>
            <a-asset-item id="myModel" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3"></a-asset-item>
        </a-assets>

        <a-entity camera position="0 1.6 0"></a-entity>

        <a-entity id="reticle" ar-hit-test-simple visible="false">
            <a-ring color="#22ff22" radius-inner="0.05" radius-outer="0.08" rotation="-90 0 0">
                <a-circle color="#22ff22" radius="0.01"></a-circle>
            </a-ring>
        </a-entity>

        <a-entity id="model" gltf-model="#myModel" scale="0.2 0.2 0.2" visible="false"></a-entity>

        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="1 1 1" intensity="0.8"></a-light>

    </a-scene>

    <script>
        AFRAME.registerComponent('ar-hit-test-simple', {
            init: function () {
                this.xrHitTestSource = null;
                this.viewerSpace = null;
                this.refSpace = null;

                this.el.sceneEl.renderer.xr.addEventListener('sessionstart', async () => {
                    let session = this.el.sceneEl.renderer.xr.getSession();
                    this.viewerSpace = await session.requestReferenceSpace('viewer');
                    this.refSpace = await session.requestReferenceSpace('local');
                    this.xrHitTestSource = await session.requestHitTestSource({ space: this.viewerSpace });
                });
            },
            tick: function () {
                const frame = this.el.sceneEl.frame;
                if (!frame || !this.xrHitTestSource) return;

                const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
                if (hitTestResults.length > 0) {
                    const pose = hitTestResults[0].getPose(this.refSpace);
                    this.el.setAttribute('visible', 'true');
                    this.el.object3D.position.copy(pose.transform.position);
                    this.el.object3D.quaternion.copy(pose.transform.orientation);
                } else {
                    this.el.setAttribute('visible', 'false');
                }
            }
        });
    </script>
</body>
</html>
